<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Numerologiczny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Style dla nagłówków tabeli */
        th {
            background-color: #f3f4f6; /* Jasnoszary */
            font-weight: 600;
        }
        /* Wyśrodkowanie tekstu w komórkach */
        td, th {
            text-align: center;
            padding: 0.75rem;
        }
        /* Obramowanie tabeli */
        table, th, td {
            border: 1px solid #d1d5db; /* Średnioszary */
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl">
        <!-- Link powrotu do strony głównej -->
        <div class="mb-4 text-center">
            <a href="index.html" class="text-blue-600 hover:text-blue-800 font-medium">
                &larr; Powrót do strony głównej
            </a>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">

            <!-- Nagłówek -->
            <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-6">Kalkulator Numerologiczny</h1>

            <!-- Sekcja wejściowa -->
            <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">
                <label for="nameInput" class="text-lg font-medium whitespace-nowrap"></label>
                <input type="text" id="nameInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="np. Jan Dawid Kowalski">
            </div>

            <!-- Przycisk Oblicz -->
            <div class="text-center mb-8">
                <button id="calculateBtn" class="bg-blue-600 text-white font-bold py-2 px-8 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-transform transform hover:scale-105">
                    Oblicz
                </button>
            </div>

            <!-- Obszar wyników -->
            <div id="resultsArea" class="space-y-8">
                <!-- Wyniki będą dynamicznie wstawiane tutaj -->
            </div>

        </div>
    </div>

    <script>
        // --- Deklaracje zmiennych dla danych ---
        let specialNumbers = {};
        let letterToValues = {};
        // To keep track of chart instances
        const chartInstances = {};

        // --- Funkcja inicjalizująca aplikację po załadowaniu danych ---
        async function initializeApp() {
            try {
                // Ładowanie danych z plików JSON
                const [specialNumbersResponse, letterValuesResponse] = await Promise.all([
                    fetch('specialNumbers.json'),
                    fetch('letterValues.json')
                ]);

                if (!specialNumbersResponse.ok || !letterValuesResponse.ok) {
                    throw new Error('Problem z załadowaniem danych');
                }

                specialNumbers = await specialNumbersResponse.json();
                letterToValues = await letterValuesResponse.json();

                // Inicjalizacja elementów DOM i event listenerów po załadowaniu danych
                setupEventListeners();
            } catch (error) {
                console.error('Błąd podczas ładowania danych:', error);
                document.getElementById('resultsArea').innerHTML = 
                    `<p class="text-center text-red-500">Błąd podczas ładowania danych. Odśwież stronę lub spróbuj później.</p>`;
            }
        }

        const calculateBtn = document.getElementById('calculateBtn');
        const nameInput = document.getElementById('nameInput');
        const resultsArea = document.getElementById('resultsArea');

        function sumDigits(n) {
            return String(n).split('').reduce((acc, digit) => acc + parseInt(digit, 10), 0);
        }

        function setupEventListeners() {
            calculateBtn.addEventListener('click', processInput);
            nameInput.addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    processInput();
                }
            });
        }

        function processInput() {
            resultsArea.innerHTML = '';
            const inputStr = nameInput.value.trim();
            if (!inputStr) {
                resultsArea.innerHTML = `<p class="text-center text-red-500">Proszę wpisać imię.</p>`;
                return;
            }
            const words = inputStr.split(/\s+/).filter(word => word.length > 0);
            if (words.length > 5) {
                resultsArea.innerHTML = `<p class="text-center text-red-500 font-semibold">Zbyt wiele imion. Maksymalnie 5.</p>`;
                return;
            }
            words.forEach((word, index) => {
                const wordId = `word-${index}`;
                createTableForWord(word, `Tabela wyliczeń G-NPS dla: ${word}`, wordId);
            });
        }

        function createTableForWord(word, label, wordId) {
            // --- Main container for this word's results ---
            const resultContainer = document.createElement('div');
            resultsArea.appendChild(resultContainer);

            // --- Table Creation ---
            let totalGematrikon = 0, totalNous = 0, totalPsyche = 0, totalSoma = 0;
            const tableContainer = document.createElement('div');
            const tableLabel = document.createElement('h2');
            tableLabel.className = 'text-2xl font-bold mb-3 text-center text-gray-800';
            tableLabel.textContent = label;
            const table = document.createElement('table');
            table.className = 'min-w-full bg-white rounded-lg shadow-md overflow-hidden';
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            const headers = ['Gematrikon', 'Litery', 'Nous', 'Psyche', 'Soma'];
            headers.forEach(headerText => {
                const th = document.createElement('th');
                let classes = 'px-4 py-3 border-b-2 border-gray-300 bg-gray-100 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider';
                if (headerText === 'Litery') {
                    classes = 'px-4 py-3 border-b-2 border-gray-300 bg-gray-200 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider';
                }
                th.className = classes;
                th.textContent = headerText;
                headerRow.appendChild(th);
            });
            const tbody = table.createTBody();
            for (const char of word) {
                if (char === ' ') continue;
                const values = letterToValues[char];
                let gematrikon = 'N/A', nous = 'N/A', psyche = 'N/A', soma = 'N/A';
                if (values) {
                    gematrikon = values.Gematrikon; nous = values.Nous; psyche = values.Psyche; soma = values.Soma;
                    totalGematrikon += gematrikon; totalNous += nous; totalPsyche += psyche; totalSoma += soma;
                }
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td class="px-4 py-3 border-b border-gray-200">${gematrikon}</td>
                    <td class="px-4 py-3 border-b border-gray-300 font-mono font-bold bg-gray-200">${char}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${nous}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${psyche}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${soma}</td>
                `;
            }
            const tfoot = table.createTFoot();
            const totalRow = tfoot.insertRow();
            totalRow.className = 'bg-gray-200 font-bold';
            const formatNumber = (num) => {
                const specialInfo = specialNumbers[num];
                return specialInfo ? `<span class="${specialInfo.colorClass}">${num}</span>` : num;
            };
            totalRow.innerHTML = `
                <td class="px-4 py-3">${formatNumber(totalGematrikon)}</td>
                <td class="px-4 py-3">Total</td>
                <td class="px-4 py-3">${formatNumber(totalNous)}</td>
                <td class="px-4 py-3">${formatNumber(totalPsyche)}</td>
                <td class="px-4 py-3">${formatNumber(totalSoma)}</td>
            `;
            const getReductionSteps = (num) => {
                const steps = [];
                if (specialNumbers[num]) return [];
                let currentNum = num;
                while (currentNum > 9) {
                    currentNum = sumDigits(currentNum);
                    const specialInfo = specialNumbers[currentNum];
                    steps.push({ value: currentNum, isSpecial: !!specialInfo, colorClass: specialInfo?.colorClass });
                    if (specialInfo) break;
                }
                return steps;
            };
            const gematrikonSteps = getReductionSteps(totalGematrikon);
            const nousSteps = getReductionSteps(totalNous);
            const psycheSteps = getReductionSteps(totalPsyche);
            const somaSteps = getReductionSteps(totalSoma);
            const maxSteps = Math.max(gematrikonSteps.length, nousSteps.length, psycheSteps.length, somaSteps.length);
            for (let i = 0; i < maxSteps; i++) {
                const reductionRow = tfoot.insertRow();
                reductionRow.className = 'bg-gray-50';
                const formatCellContent = (step) => {
                    if (!step) return '';
                    const classColor = step.isSpecial ? step.colorClass : '';
                    return `<span class="${classColor} font-semibold">${step.value}</span>`;
                };
                reductionRow.innerHTML = `
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(gematrikonSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-300 bg-gray-200"></td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(nousSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(psycheSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(somaSteps[i])}</td>
                `;
            }
            tableContainer.appendChild(tableLabel);
            tableContainer.appendChild(table);
            resultContainer.appendChild(tableContainer);

            // --- Chart Section ---
            const chartSection = document.createElement('div');
            chartSection.className = 'mt-6 text-center';

            const chartButton = document.createElement('button');
            chartButton.textContent = 'Wykres';
            chartButton.className = 'bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 active:bg-green-800 transition-transform transform hover:scale-105';

            const chartContainer = document.createElement('div');
            chartContainer.id = `chart-container-${wordId}`;
            chartContainer.className = 'mt-4 hidden'; // Initially hidden

            chartSection.appendChild(chartButton);
            chartSection.appendChild(chartContainer);
            resultContainer.appendChild(chartSection);

            chartButton.addEventListener('click', () => {
                const isHidden = chartContainer.classList.contains('hidden');
                if (isHidden) {
                    // If chart doesn't exist, create it
                    if (!chartContainer.hasChildNodes()) {
                        createChart(word, chartContainer, wordId);
                    }
                    chartContainer.classList.remove('hidden');
                    chartButton.textContent = 'Ukryj Wykres';
                } else {
                    chartContainer.classList.add('hidden');
                    chartButton.textContent = 'Wykres';
                }
            });
        }

        function createChart(word, container, wordId) {
            // Destroy previous chart instance if it exists
            if (chartInstances[wordId]) {
                chartInstances[wordId].destroy();
            }

            const canvas = document.createElement('canvas');
            container.appendChild(canvas);

            const labels = word.split('');
            const dataPoints = labels.map(char => letterToValues[char]?.Soma || 0);

            const ctx = canvas.getContext('2d');
            chartInstances[wordId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Wartość Soma`,
                        data: dataPoints,
                        borderColor: 'rgba(59, 130, 246, 1)',
                        backgroundColor: 'rgba(59, 130, 246, 1)',
                        fill: false,
                        tension: 0,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: `Wykres dla: ${word}`,
                            font: {
                                size: 18
                            }
                        },
                        // MODIFICATION: Disable the tooltip entirely
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 10,
                            ticks: {
                                stepSize: 1,
                                font: {
                                    size: 14
                                },
                                callback: function(value, index, values) {
                                    return value > 9 ? null : value;
                                }
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });

            // --- Cycle Information ---
            const cycleInfo = document.createElement('p');
            cycleInfo.className = 'mt-4 text-lg font-semibold';

            const firstLetterSoma = dataPoints[0];
            const lastLetterSoma = dataPoints[dataPoints.length - 1];

            if (lastLetterSoma > firstLetterSoma) {
                cycleInfo.innerHTML = `<span class="text-green-600">Cykl wzrostowy ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            } else if (lastLetterSoma < firstLetterSoma) {
                cycleInfo.innerHTML = `<span class="text-red-600">Cykl upadkowy ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            } else {
                cycleInfo.innerHTML = `<span class="text-gray-600">Cykl stagnacyjny ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            }
            container.appendChild(cycleInfo);
        }

        // Inicjalizacja aplikacji po załadowaniu strony
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
