<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwadrat Pitagorejski — coloured empties</title>

    <!-- Tailwind & fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; }

        /* ─── GRID ─────────────────────────────────────────────── */
        .numerology-square {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 300px;
            height: 300px;
            border: 2px solid #4a5568; /* dark‑gray */
            border-radius: 0.5rem;
            margin-inline: auto;
            overflow: hidden; /* clip child cells to rounded border */
        }

        .square-cell {
            border: 1px solid #cbd5e0; /* mid‑gray */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0.5rem;
            box-sizing: border-box;
            position: relative;
            min-height: 100px;
            overflow: hidden;
        }

        /* highlighted (all‑filled line) */
        .square-cell.is-highlighted {
            background-color: rgba(152, 251, 152, 0.45);
            background-clip: padding-box;
        }

        /* empty cell */
        .square-cell.is-empty {
            background-color: rgba(255, 99, 71, 0.15); /* gentle red */
            background-clip: padding-box;
        }

        /* ─── TYPOGRAPHY ───────────────────────────────────────── */
        .cell-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a0aec0; /* light‑gray */
        }
        .cell-letters {
            font-weight: 500;
            color: #2d3748; /* dark‑gray */
            word-break: break-word;
            line-height: 1.4;
            transition: font-size 0.2s ease-in-out;
        }

        /* ─── SUMMARY TABLE ───────────────────────────────────── */
        .summary-table {
            width: 80%; max-width: 400px; margin: 1rem auto 0 auto;
            border-collapse: collapse; font-size: 0.9rem;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #d1d5db; padding: 0.5rem; text-align: center;
        }
        .summary-table th { background-color: #f3f4f6; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
<div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl">
    <!-- Back link -->
    <div class="mb-4 text-center">
        <a href="numerologia.html" class="text-blue-600 hover:text-blue-800 font-medium">&larr; Powrót do strony głównej</a>
    </div>

    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-6">Kwadrat Pitagorejski</h1>

        <!-- Input -->
        <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">
            <label for="nameInput" class="text-lg font-medium whitespace-nowrap"></label>
            <input type="text" id="nameInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="np. Jan Kowalski" />
        </div>

        <!-- Generate button -->
        <div class="text-center mb-8">
            <button id="calculateBtn" class="bg-blue-600 text-white font-bold py-2 px-8 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-transform transform hover:scale-105">Generuj Kwadraty</button>
        </div>

        <!-- Results -->
        <div id="resultsArea" class="space-y-12"></div>
    </div>
</div>

<script>
/******************************
 * DATA
 *****************************/
const letterToSoma = {
    'A':1,'a':1,'Ą':1,'ą':1,'Ä':1,'ä':1,'J':1,'j':1,'S':1,'s':1,'Ś':1,'ś':1,'ß':1,
    'B':2,'b':2,'K':2,'k':2,'T':2,'t':2,
    'C':3,'c':3,'Ć':3,'ć':3,'L':3,'l':3,'Ł':3,'ł':3,'U':3,'u':3,'Ü':3,'ü':3,
    'D':4,'d':4,'M':4,'m':4,'V':4,'v':4,
    'E':5,'e':5,'Ę':5,'ę':5,'N':5,'n':5,'Ń':5,'ń':5,'Ñ':5,'ñ':5,'W':5,'w':5,
    'F':6,'f':6,'O':6,'o':6,'Ó':6,'ó':6,'Ö':6,'ö':6,'X':6,'x':6,
    'G':7,'g':7,'P':7,'p':7,'Y':7,'y':7,
    'H':8,'h':8,'Q':8,'q':8,'Z':8,'z':8,'Ż':8,'ż':8,'Ž':8,'ž':8,
    'I':9,'i':9,'R':9,'r':9
};

/******************************
 * DOM CACHE
 *****************************/
const calculateBtn = document.getElementById('calculateBtn');
const nameInput    = document.getElementById('nameInput');
const resultsArea  = document.getElementById('resultsArea');

calculateBtn.addEventListener('click', processInput);
nameInput.addEventListener('keyup', e => { if (e.key === 'Enter') processInput(); });

/******************************
 * MAIN FLOW
 *****************************/
function processInput() {
    resultsArea.innerHTML = '';
    const input = nameInput.value.trim();
    if (!input) {
        resultsArea.innerHTML = '<p class="text-center text-red-500">Proszę wpisać tekst.</p>';
        return;
    }
    const words = input.split(/\s+/).filter(Boolean);
    if (words.length > 5) {
        resultsArea.innerHTML = '<p class="text-center text-red-500 font-semibold">Zbyt wiele słów. Maksymalnie 5.</p>';
        return;
    }
    words.forEach(createSquare);
}

/******************************
 * GENERATE ONE SQUARE
 *****************************/
function createSquare(word) {
    // container
    const wrapper = document.createElement('div');
    wrapper.className = 'space-y-4';

    // title
    const title = document.createElement('h2');
    title.className = 'text-2xl font-bold text-center text-gray-800';
    title.textContent = `Kwadrat dla: "${word}"`;
    wrapper.appendChild(title);

    // grid
    const grid = document.createElement('div');
    grid.className = 'numerology-square';

    // cells reference map
    const cells = {};
    for (let i = 1; i <= 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'square-cell';
        cell.innerHTML = `<span class="cell-number">${i}</span><div id="letters-${word}-${i}" class="cell-letters"></div>`;
        cells[i] = cell;
    }

    // distribute letters
    for (const ch of word) {
        const soma = letterToSoma[ch];
        if (!soma) continue;
        const box = cells[soma].querySelector(`#letters-${word}-${soma}`);
        box.textContent += box.textContent ? `, ${ch}` : ch;
    }

    // responsive font-size inside each cell
    for (let i = 1; i <= 9; i++) {
        const box = cells[i].querySelector(`#letters-${word}-${i}`);
        const len = box.textContent.length;
        box.style.fontSize =
            len > 25 ? '0.65rem' :
            len > 18 ? '0.8rem'  :
            len > 12 ? '0.9rem'  :
            len > 6  ? '1rem'    : '1.1rem';
    }

    // colour logic
    highlightAndEmpty(cells, word);

    // append cells in visual order
    [3,6,9,2,5,8,1,4,7].forEach(n => grid.appendChild(cells[n]));
    wrapper.appendChild(grid);

    // summary button & container
    const btnWrap = document.createElement('div');
    btnWrap.className = 'text-center mt-6';
    const btn = document.createElement('button');
    btn.className = 'bg-gray-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-700 active:bg-gray-800 transition';
    btn.textContent = 'Podsumowanie';
    btnWrap.appendChild(btn);

    const summary = document.createElement('div');
    summary.className = 'hidden mt-4';
    summary.id = `summary-${word}`;

    btn.addEventListener('click', () => {
        const hidden = summary.classList.toggle('hidden');
        btn.textContent = hidden ? 'Podsumowanie' : 'Ukryj podsumowanie';
        if (!hidden && !summary.innerHTML) buildSummary(word, summary);
    });

    wrapper.appendChild(btnWrap);
    wrapper.appendChild(summary);

    resultsArea.appendChild(wrapper);
}

/******************************
 * COLOURING LOGIC
 *****************************/
function highlightAndEmpty(cells, word) {
    const filled = {};
    for (let i = 1; i <= 9; i++) {
        filled[i] = !!cells[i].querySelector(`#letters-${word}-${i}`).textContent.trim();
    }

    // mark empties
    for (let i = 1; i <= 9; i++) {
        if (!filled[i]) cells[i].classList.add('is-empty');
    }

    // evaluate complete lines
    const ROWS   = [[3,6,9],[2,5,8],[1,4,7]];
    const COLS   = [[3,2,1],[6,5,4],[9,8,7]];
    const DIAGS  = [[1,5,9],[3,5,7]];
    const lines  = [...ROWS, ...COLS, ...DIAGS];

    const toHighlight = new Set();
    lines.forEach(line => {
        if (line.every(n => filled[n])) line.forEach(n => toHighlight.add(n));
    });

    toHighlight.forEach(n => cells[n].classList.add('is-highlighted'));
}

/******************************
 * SUMMARY TABLE BUILDER
 *****************************/
function buildSummary(word, container) {
    const buckets = Array.from({ length: 10 }, () => []); // 0‑9 idx, ignore 0

    for (const ch of word) {
        const soma = letterToSoma[ch];
        if (soma) buckets[soma].push(ch);
    }

    const table = document.createElement('table');
    table.className = 'summary-table';

    const thead = table.createTHead();
    const headerRow = thead.insertRow();
    ['Liczba','Litery','Suma'].forEach(txt => {
        const th = document.createElement('th');
        th.textContent = txt;
        headerRow.appendChild(th);
    });

    const tbody = table.createTBody();
    for (let i = 1; i <= 9; i++) {
        const row = tbody.insertRow();
        row.insertCell().textContent = i;
        row.insertCell().textContent = buckets[i].join(', ') || '-';
        row.insertCell().textContent = buckets[i].length;
    }

    container.appendChild(table);
}
</script>
</body>
</html>
