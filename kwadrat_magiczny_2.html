<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwadrat Magiczny — z kolorowaniem</title>

    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; background-color:#f3f4f6; }

        /* ─── GRID ─────────────────────────────────────────────── */
        .numerology-square {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 300px;
            height: 300px;
            border: 2px solid #4b5563; /* dark gray */
            border-radius: 0.5rem;
            margin-inline: auto;
            background-color:#ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            overflow:hidden; /* keep rounded edges tidy */
        }

        /* MODIFIED: This is the main change.
           - We use flexbox to center the content (the letters).
           - `position: relative` allows us to position the cell number absolutely inside it.
        */
        .square-cell {
            border:1px solid #e5e7eb;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:0.5rem;
            min-height:100px;
            box-sizing:border-box;
            transition:background-color 0.3s ease;
            position: relative; /* For positioning the number */
        }
        /* --- colouring classes --- */
        .square-cell.has-letter { background-color:rgba(134,239,172,0.25); } /* green tint */
        .square-cell.is-highlighted { background-color:rgba(134,239,172,0.45); } /* deeper green */
        .square-cell.is-empty { background-color:rgba(255,99,71,0.15); } /* gentle red */

        /* ─── TYPOGRAPHY ───────────────────────────────────────── */

        /* MODIFIED: The cell number is now positioned absolutely in the top-left corner. */
        .cell-number{
            position: absolute;
            top: 0.05rem;
            left: 0.3rem;
            font-size:1.1rem;
            font-weight:bold;
            color:#9ca3af;
        }

        /* MODIFIED: Added text-align:center to ensure letters are centered, especially if they wrap. */
        .cell-letters{
            font-weight:500;
            color:#1f2937;
            word-break:break-word;
            line-height:1.3;
            transition:font-size 0.2s ease-in-out;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl">
    <div class="mb-4 text-center">
      <a href="index.html" class="text-blue-600 hover:text-blue-800 font-medium">&larr; Powrót do strony głównej</a>
    </div>

    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
      <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-2">Kwadrat Magiczny</h1>

      <!-- input -->
      <div class="flex flex-col sm:flex-row items-center gap-4 mb-6 max-w-lg mx-auto">
        <label for="nameInput" class="sr-only">Wpisz tekst</label>
        <input type="text" id="nameInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="np. Anna Nowak" />
      </div>

      <div class="text-center mb-8">
        <button id="calculateBtn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-transform transform hover:scale-105 shadow-md hover:shadow-lg">Generuj Kwadraty</button>
      </div>

      <div id="resultsArea" class="space-y-12"></div>
    </div>
    <footer class="text-center text-gray-500 mt-8 text-sm">Kalkulator numerologiczny</footer>
  </div>

<script>
/* ========= DATA ========= */
const letterToSoma={
  'A':1,'a':1,'Ą':1,'ą':1,'Ä':1,'ä':1,'J':1,'j':1,'S':1,'s':1,'Ś':1,'ś':1,'ß':1,
  'B':2,'b':2,'K':2,'k':2,'T':2,'t':2,
  'C':3,'c':3,'Ć':3,'ć':3,'L':3,'l':3,'Ł':3,'ł':3,'U':3,'u':3,'Ü':3,'ü':3,
  'D':4,'d':4,'M':4,'m':4,'V':4,'v':4,
  'E':5,'e':5,'Ę':5,'ę':5,'N':5,'n':5,'Ń':5,'ń':5,'Ñ':5,'ñ':5,'W':5,'w':5,
  'F':6,'f':6,'O':6,'o':6,'Ó':6,'ó':6,'Ö':6,'ö':6,'X':6,'x':6,
  'G':7,'g':7,'P':7,'p':7,'Y':7,'y':7,
  'H':8,'h':8,'Q':8,'q':8,'Z':8,'z':8,'Ż':8,'ż':8,'Ž':8,'ž':8,
  'I':9,'i':9,'R':9,'r':9
};

/* ========= DOM ========= */
const btn=document.getElementById('calculateBtn');
const input=document.getElementById('nameInput');
const area=document.getElementById('resultsArea');
btn.addEventListener('click',processInput);
input.addEventListener('keyup',e=>{if(e.key==='Enter')processInput();});

/* ========= MAIN ========= */
function processInput(){
  area.innerHTML='';
  const str=input.value.trim();
  if(!str){area.innerHTML='<p class="text-center text-red-500">Proszę wpisać tekst.</p>';return;}
  const words=str.split(/\s+/).filter(Boolean);
  if(words.length>5){area.innerHTML='<p class="text-center text-red-500 font-semibold">Można przetworzyć maksymalnie 5 słów.</p>';return;}
  words.forEach(createSquare);
}

/* ========= CREATE SQUARE ========= */
function createSquare(word){
  const wrap=document.createElement('div');wrap.className='space-y-4';
  wrap.innerHTML=`<h2 class="text-2xl font-bold text-center text-gray-800">Kwadrat dla: "${word}"</h2>`;
  const grid=document.createElement('div');grid.className='numerology-square';

  const cells={};
  for(let i=1;i<=9;i++){
    const cell=document.createElement('div');cell.className='square-cell';
    cell.innerHTML=`<span class='cell-number'>${i}</span><div id='letters-${word}-${i}' class='cell-letters'></div>`;
    cells[i]=cell;
  }

  // distribute letters
  for(const ch of word){
    const val=letterToSoma[ch];
    if(!val)continue;
    const box=cells[val].querySelector(`#letters-${word}-${val}`);
    box.textContent+=box.textContent?`, ${ch}`:ch;
  }

  // dynamic font-size
  for(let i=1;i<=9;i++){
    const box=cells[i].querySelector(`#letters-${word}-${i}`);
    const len=box.textContent.length;
    box.style.fontSize=len>25?'0.7rem':len>18?'0.8rem':len>12?'0.9rem':len>6?'1rem':'1.1rem';
  }

  colourCells(cells,word);

  // custom visual order
  [4,9,2,3,5,7,8,1,6].forEach(n=>grid.appendChild(cells[n]));
  wrap.appendChild(grid);
  area.appendChild(wrap);
}

/* ========= COLOUR LOGIC ========= */
function colourCells(cells,word){
  const filled={};
  for(let i=1;i<=9;i++){
    const has=!!cells[i].querySelector(`#letters-${word}-${i}`).textContent.trim();
    filled[i]=has;
    cells[i].classList.add(has?'has-letter':'is-empty');
  }

  // lines for this visual layout
  const lines=[
    [4,9,2],[3,5,7],[8,1,6],         // rows
    [4,3,8],[9,5,1],[2,7,6],         // columns
    [4,5,6],[8,5,2]                  // diagonals
  ];

  lines.forEach(line=>{
    if(line.every(n=>filled[n])) line.forEach(n=>cells[n].classList.add('is-highlighted'));
  });
}
</script>
</body>
</html>
