<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Numerologiczny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Include jsPDF and html2canvas for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2a2f 0%, #0f1a3d 40%, #0e1530 65%, #0a0a1a 100%);
        }

        .font-cinzel {
            font-family: 'Cinzel', serif;
        }

        /* Page title gradient text — copper/bronze */
        .title-gradient {
            background: linear-gradient(135deg, #d4a574 0%, #c49a6c 40%, #b8895e 60%, #d4a574 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Copper divider */
        .copper-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(196, 154, 108, 0.5), transparent);
        }

        /* Subtle background pattern — teal-tinted */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 600px 600px at 15% 50%, rgba(20, 100, 120, 0.1), transparent),
                radial-gradient(ellipse 500px 500px at 85% 25%, rgba(30, 80, 140, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* Glass card — teal-tinted */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(196, 154, 108, 0.12);
            border-radius: 0.75rem;
        }

        /* Fade-in animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* =============================================
           DARK THEME OVERRIDES FOR JS-GENERATED ELEMENTS
           These use #resultsArea descendant selectors to
           beat Tailwind utility class specificity.
           ============================================= */

        /* Main results table */
        #resultsArea table {
            background: rgba(10, 30, 40, 0.7);
            border: 1px solid rgba(196, 154, 108, 0.2);
            border-collapse: collapse;
            width: 100%;
        }

        /* Table header cells — override bg-gray-100/bg-gray-200 */
        #resultsArea th {
            background-color: rgba(15, 35, 50, 0.9);
            color: #d4a574;
            border: 1px solid rgba(196, 154, 108, 0.2);
            font-weight: 600;
            text-align: center;
            padding: 0.75rem;
        }

        /* Table body cells — override bg-gray-200, text colors, borders */
        #resultsArea td {
            background-color: rgba(10, 25, 35, 0.6);
            color: #e2dcd5;
            border: 1px solid rgba(196, 154, 108, 0.12);
            text-align: center;
            padding: 0.75rem;
        }

        /* Letter column highlight — override bg-gray-200 on Litery column */
        #resultsArea td.bg-gray-200 {
            background-color: rgba(20, 40, 55, 0.8);
        }

        /* Total row — override bg-gray-200 */
        #resultsArea tfoot tr.bg-gray-200 {
            background-color: rgba(196, 154, 108, 0.12);
        }
        #resultsArea tfoot tr.bg-gray-200 td {
            background-color: transparent;
            color: #e8ddd0;
            font-weight: 700;
        }

        /* Reduction rows — override bg-gray-50 */
        #resultsArea tfoot tr.bg-gray-50 {
            background-color: rgba(10, 25, 35, 0.4);
        }
        #resultsArea tfoot tr.bg-gray-50 td {
            background-color: transparent;
            color: #c9bfb3;
        }
        #resultsArea tfoot tr.bg-gray-50 td.bg-gray-200 {
            background-color: rgba(20, 40, 55, 0.5);
        }

        /* Table label h2 — override text-gray-800 */
        #resultsArea h2.text-gray-800 {
            color: #e8ddd0;
        }

        /* Shadow override on tables */
        #resultsArea table.shadow-md {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* --- Analysis container (vowels/consonants) --- */
        /* Override bg-gray-50 and border-gray-200 on analysis container */
        #resultsArea div.bg-gray-50 {
            background-color: rgba(10, 30, 40, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-color: rgba(196, 154, 108, 0.15);
        }

        /* Analysis heading — override text-gray-900 */
        #resultsArea h3.text-gray-900 {
            color: #d4a574;
        }

        /* Cycles table (analysis of vowels/consonants) */
        .cycles-table {
            width: 100%;
            max-width: 600px;
            margin: 1.5rem auto 0 auto;
            border-collapse: collapse;
            font-size: 1rem;
            opacity: 0;
            animation: fadeIn 0.6s 0.3s ease-out forwards;
        }
        .cycles-table th, .cycles-table td {
            border: 1px solid rgba(196, 154, 108, 0.18);
            padding: 0.85rem 1rem;
            text-align: center;
        }
        .cycles-table th {
            background-color: rgba(15, 35, 50, 0.9);
            font-weight: 600;
            color: #d4a574;
        }
        .cycles-table td {
            background-color: rgba(10, 25, 35, 0.6);
            color: #e2dcd5;
        }
        .cycles-table td:first-child {
            text-align: center;
            font-weight: 500;
            color: #d4a574;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- Dynamically created buttons --- */
        /* Toggle analysis button — override bg-indigo-600 */
        #resultsArea button.bg-indigo-600 {
            background: linear-gradient(135deg, rgba(196, 154, 108, 0.25), rgba(196, 154, 108, 0.1));
            border: 1px solid rgba(196, 154, 108, 0.3);
            color: #d4a574;
            transition: all 0.3s ease;
        }
        #resultsArea button.bg-indigo-600:hover,
        #resultsArea button.hover\:bg-indigo-700:hover {
            background: linear-gradient(135deg, rgba(196, 154, 108, 0.35), rgba(196, 154, 108, 0.15));
            border-color: rgba(196, 154, 108, 0.5);
        }

        /* PDF button — override bg-blue-600 */
        #resultsArea button.bg-blue-600 {
            background: linear-gradient(135deg, #c49a6c, #a67c52);
            color: #0a1a1f;
            border: none;
            transition: all 0.3s ease;
        }
        #resultsArea button.bg-blue-600:hover,
        #resultsArea button.hover\:bg-blue-700:hover {
            background: linear-gradient(135deg, #d4a574, #b8895e);
            box-shadow: 0 4px 16px rgba(196, 154, 108, 0.25);
        }

        /* Chart button — override bg-green-600 */
        #resultsArea button.bg-green-600 {
            background: linear-gradient(135deg, rgba(40, 160, 140, 0.7), rgba(30, 120, 110, 0.7));
            color: #e0f0ed;
            border: 1px solid rgba(40, 160, 140, 0.3);
            transition: all 0.3s ease;
        }
        #resultsArea button.bg-green-600:hover,
        #resultsArea button.hover\:bg-green-700:hover {
            background: linear-gradient(135deg, rgba(50, 180, 155, 0.8), rgba(40, 140, 120, 0.8));
            box-shadow: 0 4px 16px rgba(40, 160, 140, 0.2);
        }

        /* --- Chart.js container --- */
        #resultsArea canvas {
            border-radius: 0.5rem;
        }

        /* Cycle info text — keep green/red/gray readable on dark bg */
        /* The JS uses text-green-600, text-red-600, text-gray-600 — keep them as is,
           they are Tailwind classes and readable on dark. text-gray-600 is a bit dim though. */
        #resultsArea .text-gray-600 {
            color: #9ca3af;
        }

        /* Error messages — keep red visible */
        #resultsArea .text-red-500 {
            color: #f87171;
        }

        /* ============================================= */

        /* Nav back link */
        .nav-back-link {
            color: #d4a574;
            transition: color 0.2s ease;
        }
        .nav-back-link:hover {
            color: #e8c9a0;
        }

        /* Custom styled input */
        .calc-input {
            background: rgba(10, 30, 40, 0.6);
            border: 1px solid rgba(196, 154, 108, 0.25);
            color: #e8ddd0;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .calc-input::placeholder {
            color: rgba(196, 180, 160, 0.4);
        }
        .calc-input:focus {
            outline: none;
            border-color: rgba(196, 154, 108, 0.6);
            box-shadow: 0 0 0 3px rgba(196, 154, 108, 0.15);
        }

        /* Calculate button */
        .calc-btn {
            background: linear-gradient(135deg, #c49a6c, #a67c52);
            color: #0a1a1f;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .calc-btn:hover {
            background: linear-gradient(135deg, #d4a574, #b8895e);
            box-shadow: 0 4px 20px rgba(196, 154, 108, 0.3);
            transform: scale(1.03);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }
        .calc-btn:focus-visible {
            outline: 2px solid rgba(196, 154, 108, 0.8);
            outline-offset: 2px;
        }
    </style>
</head>
<body class="text-gray-100">

    <!-- Subtle background radials -->
    <div class="bg-pattern"></div>

    <div class="relative z-10 container mx-auto px-4 sm:px-6 md:px-8 py-6 sm:py-10 max-w-5xl min-h-screen flex flex-col">

        <!-- Navigation bar -->
        <nav class="flex items-center justify-between mb-6 animate-fade-in delay-1">
            <a href="index.html" class="nav-back-link flex items-center gap-2 font-medium text-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Powrót
            </a>
            <a href="index.html" class="nav-back-link font-cinzel text-sm tracking-wider opacity-60 hover:opacity-90">Numerologia</a>
        </nav>

        <!-- Main content card -->
        <div class="glass-card p-6 sm:p-8 flex-1 animate-fade-in delay-2">

            <!-- Page heading -->
            <h1 class="font-cinzel title-gradient text-3xl sm:text-4xl md:text-5xl font-bold text-center mb-2 tracking-wide">
                Kalkulator Numerologiczny
            </h1>
            <div class="copper-divider max-w-xs mx-auto mt-3 mb-8"></div>

            <!-- Input section -->
            <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">
                <label for="nameInput" class="text-lg font-medium whitespace-nowrap"></label>
                <input type="text" id="nameInput" class="calc-input w-full px-4 py-3 rounded-lg text-base" placeholder="np. Jan Dawid Kowalski">
            </div>

            <!-- Calculate button -->
            <div class="text-center mb-8">
                <button id="calculateBtn" class="calc-btn py-2.5 px-10 rounded-lg text-base">
                    Oblicz
                </button>
            </div>

            <!-- Results area — ID must remain exactly 'resultsArea' -->
            <div id="resultsArea" class="space-y-8">
                <!-- Wyniki będą dynamicznie wstawiane tutaj -->
            </div>

        </div>

        <!-- Footer -->
        <footer class="mt-10 sm:mt-14 animate-fade-in delay-3">
            <div class="copper-divider max-w-xs mx-auto mb-6"></div>
            <div class="text-center">
                <img src="sth-logo.png" alt="STH Logo" class="mx-auto h-12 opacity-60 hover:opacity-80 transition-opacity duration-300">
            </div>
        </footer>

    </div>

    <script>
        // --- Deklaracje zmiennych dla danych ---
        let specialNumbers = {};
        let letterToValues = {};
        // To keep track of chart instances
        const chartInstances = {};

        // --- Funkcja inicjalizująca aplikację po załadowaniu danych ---
        async function initializeApp() {
            try {
                // Ładowanie danych z plików JSON
                const [specialNumbersResponse, letterValuesResponse] = await Promise.all([
                    fetch('specialNumbers.json'),
                    fetch('letterValues.json')
                ]);

                if (!specialNumbersResponse.ok || !letterValuesResponse.ok) {
                    throw new Error('Problem z załadowaniem danych');
                }

                specialNumbers = await specialNumbersResponse.json();
                letterToValues = await letterValuesResponse.json();

                // Inicjalizacja elementów DOM i event listenerów po załadowaniu danych
                setupEventListeners();
            } catch (error) {
                console.error('Błąd podczas ładowania danych:', error);
                document.getElementById('resultsArea').innerHTML =
                    `<p class="text-center text-red-500">Błąd podczas ładowania danych. Odśwież stronę lub spróbuj później.</p>`;
            }
        }

        const calculateBtn = document.getElementById('calculateBtn');
        const nameInput = document.getElementById('nameInput');
        const resultsArea = document.getElementById('resultsArea');

        function sumDigits(n) {
            return String(n).split('').reduce((acc, digit) => acc + parseInt(digit, 10), 0);
        }

        // --- Normalizacja greckich liter: usunięcie akcentów i unifikacja wariantów ---
        // Umożliwia dopasowanie do kluczy w letterValues.json (bez znaków diakrytycznych)
        function normalizeGreek(text) {
            return text
                .normalize('NFD')                 // rozbij litera + znaki łączące
                .replace(/[\u0300-\u036f]/g, '') // usuń diakrytyki (tonos/dialytika)
                .replace(/ς/g, 'σ')               // sigma końcowa → sigma
                .replace(/Ϊ/g, 'Ι').replace(/ϊ/g, 'ι')
                .replace(/Ϋ/g, 'Υ').replace(/ϋ/g, 'υ');
        }

        // --- Dodatkowa logika: analiza samogłosek i spółgłosek wg mapy 1–9 ---
        // UŻYWAJ wartości Soma z letterValues.json, aby objąć także grecki i rosyjski alfabet
        // Zestaw samogłosek dla jęz. polskiego (łacińskie), greckiego i rosyjskiego (cyrylica)
        const vowelsPL = ['A', 'Ą', 'E', 'Ę', 'I', 'O', 'Ó', 'U', 'Y'];
        const vowelsGR = ['Α', 'Ε', 'Η', 'Ι', 'Ο', 'Υ', 'Ω'];
        const vowelsRU = ['А', 'Е', 'Ё', 'И', 'О', 'У', 'Ы', 'Э', 'Ю', 'Я'];

        function reduceNumberToFinal(num) {
            let currentNum = num;
            while (currentNum > 9) {
                if ([11, 22, 33, 44].includes(currentNum)) {
                    break;
                }
                currentNum = String(currentNum).split('').reduce((acc, d) => acc + parseInt(d, 10), 0);
            }
            return currentNum;
        }

        function analyzeNameSimple(name) {
            const consonants = { letters: [], values: [], soma: 0, suma: 0 };
            const vowelsData = { letters: [], values: [], soma: 0, suma: 0 };
            // Zachowaj polskie, greckie i rosyjskie litery; usuń diakrytyki oraz unifikuj grecki końcowy sigma
            const normalizedName = name
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/ς/g, 'σ')
                .toUpperCase()
                // Dozwolone zakresy: łaciński (A-Z + polskie), grecki (0370–03FF), cyrylica (0400–04FF)
                .replace(/[^A-ZĄĆĘŁŃÓŚŹŻ\u0370-\u03FF\u0400-\u04FF]/g, '');
            for (const letter of normalizedName) {
                // Wartość bierzemy z pełnej mapy letterValues.json (pole Soma 1–9)
                const value = letterToValues[letter]?.Soma;
                if (value === undefined) continue;
                const isPolishVowel = vowelsPL.includes(letter);
                const isGreekVowel = vowelsGR.includes(letter);
                const isRussianVowel = vowelsRU.includes(letter);
                if (isPolishVowel || isGreekVowel || isRussianVowel) {
                    vowelsData.letters.push(letter);
                    vowelsData.values.push(value);
                    vowelsData.soma += value;
                } else {
                    consonants.letters.push(letter);
                    consonants.values.push(value);
                    consonants.soma += value;
                }
            }
            consonants.suma = reduceNumberToFinal(consonants.soma);
            vowelsData.suma = reduceNumberToFinal(vowelsData.soma);
            return { consonants, vowelsData };
        }

        function generateNameTableHTMLSimple(analysis) {
            const { consonants, vowelsData } = analysis;
            // Ensure letters are displayed in lower case in the table
            const consonantLettersDisplay = consonants.letters.map(l => l.toLowerCase()).join(', ');
            const vowelLettersDisplay = vowelsData.letters.map(l => l.toLowerCase()).join(', ');
            return `
            <div class="table-container" style="opacity:0; animation: fadeIn 0.6s 0.3s ease-out forwards;">
                <table class="cycles-table" aria-label="Wyniki analizy numerologicznej samogłosek i spółgłosek">
                    <thead>
                        <tr>
                            <th>Kategoria</th>
                            <th>Litery</th>
                            <th>Soma</th>
                            <th>Suma</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Spółgłoski</td>
                            <td>${consonants.letters.length > 0 ? consonantLettersDisplay : 'Brak'}</td>
                            <td>${consonants.values.length > 0 ? `${consonants.values.join(', ')}` : '0'}</td>
                            <td>${consonants.soma > 0 ? consonants.suma : '0'}</td>
                        </tr>
                        <tr>
                            <td>Samogłoski</td>
                            <td>${vowelsData.letters.length > 0 ? vowelLettersDisplay : 'Brak'}</td>
                            <td>${vowelsData.values.length > 0 ? `${vowelsData.values.join(', ')}` : '0'}</td>
                            <td>${vowelsData.soma > 0 ? vowelsData.suma : '0'}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            `;
        }

        function setupEventListeners() {
            calculateBtn.addEventListener('click', processInput);
            nameInput.addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    processInput();
                }
            });
        }

        function processInput() {
            resultsArea.innerHTML = '';
            const inputStr = nameInput.value.trim();
            if (!inputStr) {
                resultsArea.innerHTML = `<p class="text-center text-red-500">Proszę wpisać imię.</p>`;
                return;
            }
            const words = inputStr.split(/\s+/).filter(word => word.length > 0);
            if (words.length > 5) {
                resultsArea.innerHTML = `<p class="text-center text-red-500 font-semibold">Zbyt wiele imion. Maksymalnie 5.</p>`;
                return;
            }
            words.forEach((word, index) => {
                const wordId = `word-${index}`;
                createTableForWord(word, `Tabela wyliczeń G-NPS dla: ${word}`, wordId);
            });

            // No global PDF button - each word will have its own
        }

        function createTableForWord(word, label, wordId) {
            // --- Main container for this word's results ---
            const resultContainer = document.createElement('div');
            resultsArea.appendChild(resultContainer);

            // --- Table Creation ---
            let totalGematrikon = 0, totalNous = 0, totalPsyche = 0, totalSoma = 0;
            const tableContainer = document.createElement('div');
            const tableLabel = document.createElement('h2');
            tableLabel.className = 'text-2xl font-bold mb-3 text-center text-gray-800';
            tableLabel.textContent = label;
            const table = document.createElement('table');
            table.className = 'min-w-full bg-white rounded-lg shadow-md overflow-hidden';
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            const headers = ['Gematrikon', 'Litery', 'Nous', 'Psyche', 'Soma'];
            headers.forEach(headerText => {
                const th = document.createElement('th');
                let classes = 'px-4 py-3 border-b-2 border-gray-300 bg-gray-100 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider';
                if (headerText === 'Litery') {
                    classes = 'px-4 py-3 border-b-2 border-gray-300 bg-gray-200 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider';
                }
                th.className = classes;
                th.textContent = headerText;
                headerRow.appendChild(th);
            });
            const tbody = table.createTBody();
            // Używamy oryginalnych znaków do wyświetlania, ale znormalizowanych do wyszukiwania wartości
            const originalChars = [...word];
            const lookupChars = [...normalizeGreek(word)];
            for (let i = 0; i < lookupChars.length; i++) {
                const displayChar = originalChars[i];
                const lookupChar = lookupChars[i];
                if (displayChar === ' ') continue;
                const values = letterToValues[lookupChar];
                let gematrikon = 'N/A', nous = 'N/A', psyche = 'N/A', soma = 'N/A';
                if (values) {
                    gematrikon = values.Gematrikon; nous = values.Nous; psyche = values.Psyche; soma = values.Soma;
                    totalGematrikon += gematrikon; totalNous += nous; totalPsyche += psyche; totalSoma += soma;
                }
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td class="px-4 py-3 border-b border-gray-200">${gematrikon}</td>
                    <td class="px-4 py-3 border-b border-gray-300 font-mono font-bold bg-gray-200">${displayChar}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${nous}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${psyche}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${soma}</td>
                `;
            }
            const tfoot = table.createTFoot();
            const totalRow = tfoot.insertRow();
            totalRow.className = 'bg-gray-200 font-bold';
            const formatNumber = (num) => {
                const specialInfo = specialNumbers[num];
                return specialInfo ? `<span class="${specialInfo.colorClass}">${num}</span>` : num;
            };
            totalRow.innerHTML = `
                <td class="px-4 py-3">${formatNumber(totalGematrikon)}</td>
                <td class="px-4 py-3">Total</td>
                <td class="px-4 py-3">${formatNumber(totalNous)}</td>
                <td class="px-4 py-3">${formatNumber(totalPsyche)}</td>
                <td class="px-4 py-3">${formatNumber(totalSoma)}</td>
            `;
            const getReductionSteps = (num) => {
                const steps = [];
                if (specialNumbers[num]) return [];
                let currentNum = num;
                while (currentNum > 9) {
                    currentNum = sumDigits(currentNum);
                    const specialInfo = specialNumbers[currentNum];
                    steps.push({ value: currentNum, isSpecial: !!specialInfo, colorClass: specialInfo?.colorClass });
                    if (specialInfo) break;
                }
                return steps;
            };
            const gematrikonSteps = getReductionSteps(totalGematrikon);
            const nousSteps = getReductionSteps(totalNous);
            const psycheSteps = getReductionSteps(totalPsyche);
            const somaSteps = getReductionSteps(totalSoma);
            const maxSteps = Math.max(gematrikonSteps.length, nousSteps.length, psycheSteps.length, somaSteps.length);
            for (let i = 0; i < maxSteps; i++) {
                const reductionRow = tfoot.insertRow();
                reductionRow.className = 'bg-gray-50';
                const formatCellContent = (step) => {
                    if (!step) return '';
                    const classColor = step.isSpecial ? step.colorClass : '';
                    return `<span class="${classColor} font-semibold">${step.value}</span>`;
                };
                reductionRow.innerHTML = `
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(gematrikonSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-300 bg-gray-200"></td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(nousSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(psycheSteps[i])}</td>
                    <td class="px-4 py-3 border-b border-gray-200">${formatCellContent(somaSteps[i])}</td>
                `;
            }
            tableContainer.appendChild(tableLabel);
            tableContainer.appendChild(table);
            resultContainer.appendChild(tableContainer);

            // --- Druga tabela: analiza samogłosek i spółgłosek (wg mapy 1–9) ---
            // Kontener pod główną tabelą z przyciskiem toggle i ukrywaną sekcją
            const secondTableSection = document.createElement('div');
            secondTableSection.className = 'mt-6';

            // Przygotowanie unikalnych identyfikatorów per słowo, aby uniknąć kolizji
            const analysisContainerId = `analysis-container-${wordId}`;

            // Przycisk togglujący widoczność analizy
            const toggleAnalysisBtn = document.createElement('button');
            toggleAnalysisBtn.type = 'button';
            toggleAnalysisBtn.className = 'mt-2 inline-flex items-center justify-center bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-indigo-700 active:bg-indigo-800 transition';
            toggleAnalysisBtn.textContent = 'Analiza samogłosek i spółgłosek';
            toggleAnalysisBtn.setAttribute('aria-expanded', 'false');
            toggleAnalysisBtn.setAttribute('aria-controls', analysisContainerId);

            // Wrapper wyśrodkowujący przycisk
            const toggleBtnWrapper = document.createElement('div');
            toggleBtnWrapper.className = 'flex justify-center';
            toggleBtnWrapper.appendChild(toggleAnalysisBtn);

            // Ukryty na start kontener z analizą (karta)
            const analysisContainer = document.createElement('div');
            analysisContainer.id = analysisContainerId;
            analysisContainer.className = 'hidden mt-3 rounded-lg border border-gray-200 bg-gray-50 shadow-sm p-4';

            // Nagłówek sekcji wewnątrz karty
            const secondTableLabel = document.createElement('h3');
            secondTableLabel.className = 'text-lg font-semibold mb-3 text-gray-900 text-center';
            secondTableLabel.textContent = `Analiza samogłosek i spółgłosek dla: ${word}`;

            // Generowanie tabeli analizy
            const analysisResultsSimple = analyzeNameSimple(word);
            const secondTableHTML = generateNameTableHTMLSimple(analysisResultsSimple);
            const secondTableWrapper = document.createElement('div');
            secondTableWrapper.innerHTML = secondTableHTML;

            // Złożenie elementów i dodanie do DOM: wyśrodkowany przycisk, a pod nim (ukryta) karta z analizą
            analysisContainer.appendChild(secondTableLabel);
            analysisContainer.appendChild(secondTableWrapper);
            secondTableSection.appendChild(toggleBtnWrapper);
            secondTableSection.appendChild(analysisContainer);
            resultContainer.appendChild(secondTableSection);

            // Logika togglowania widoczności analizy samogł./spółgł. niezależnie od wykresu/PDF
            toggleAnalysisBtn.addEventListener('click', () => {
                const isHidden = analysisContainer.classList.contains('hidden');
                if (isHidden) {
                    analysisContainer.classList.remove('hidden');
                    toggleAnalysisBtn.textContent = 'Ukryj analizę samogłosek i spółgłosek';
                    toggleAnalysisBtn.setAttribute('aria-expanded', 'true');
                } else {
                    analysisContainer.classList.add('hidden');
                    toggleAnalysisBtn.textContent = 'Analiza samogłosek i spółgłosek';
                    toggleAnalysisBtn.setAttribute('aria-expanded', 'false');
                }
            });

            // --- PDF Button Section ---
            const pdfButton = document.createElement('button');
            pdfButton.textContent = 'Zapisz PDF';
            pdfButton.className = 'bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-transform transform hover:scale-105';
            pdfButton.dataset.wordId = wordId;
            pdfButton.addEventListener('click', () => generatePDFForWord(word, resultContainer, wordId));

            // PDF button container (initially not added to DOM - will be added in the chart section)
            const pdfButtonContainer = document.createElement('div');
            pdfButtonContainer.className = 'flex';
            pdfButtonContainer.appendChild(pdfButton);

            // --- Chart Section ---
            const chartSection = document.createElement('div');
            chartSection.className = 'mt-6 text-center';

            // Combined buttons container (for Wykres and Zapisz PDF buttons)
            const combinedButtonsContainer = document.createElement('div');
            combinedButtonsContainer.className = 'flex justify-center gap-4 mb-4';

            // Chart button container
            const chartButtonContainer = document.createElement('div');
            chartButtonContainer.className = 'flex';

            // Chart button
            const chartButton = document.createElement('button');
            chartButton.textContent = 'Wykres';
            chartButton.className = 'bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 active:bg-green-800 transition-transform transform hover:scale-105';

            // Chart container
            const chartContainer = document.createElement('div');
            chartContainer.id = `chart-container-${wordId}`;
            chartContainer.className = 'mt-4 hidden'; // Initially hidden

            // Add chart button to its container
            chartButtonContainer.appendChild(chartButton);

            // Add both button containers to the combined container
            combinedButtonsContainer.appendChild(chartButtonContainer);
            combinedButtonsContainer.appendChild(pdfButtonContainer);

            // Add elements to chart section
            chartSection.appendChild(combinedButtonsContainer);
            chartSection.appendChild(chartContainer);
            resultContainer.appendChild(chartSection);

            chartButton.addEventListener('click', () => {
                const isHidden = chartContainer.classList.contains('hidden');

                if (isHidden) {
                    // If chart doesn't exist, create it
                    if (!chartContainer.hasChildNodes()) {
                        createChart(word, chartContainer, wordId);
                    }
                    chartContainer.classList.remove('hidden');
                    chartButton.textContent = 'Ukryj Wykres';

                    // Create a new container for the PDF button below the chart
                    const newPdfContainer = document.createElement('div');
                    newPdfContainer.className = 'flex justify-center mt-4';
                    newPdfContainer.id = `pdf-below-chart-${wordId}`;

                    // Move PDF button below the chart
                    chartContainer.after(newPdfContainer);
                    newPdfContainer.appendChild(pdfButton);
                } else {
                    chartContainer.classList.add('hidden');
                    chartButton.textContent = 'Wykres';

                    // Move PDF button back to the combined buttons container
                    const belowChartContainer = document.getElementById(`pdf-below-chart-${wordId}`);
                    if (belowChartContainer) {
                        pdfButtonContainer.appendChild(pdfButton);
                        belowChartContainer.remove();
                    }
                }
            });
        }

        function createChart(word, container, wordId) {
            // Destroy previous chart instance if it exists
            if (chartInstances[wordId]) {
                chartInstances[wordId].destroy();
            }

            const canvas = document.createElement('canvas');
            container.appendChild(canvas);

            const labels = [...word];
            const lookupChars = [...normalizeGreek(word)];
            const dataPoints = lookupChars.map(ch => letterToValues[ch]?.Soma || 0);

            const ctx = canvas.getContext('2d');
            chartInstances[wordId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Wartość Soma`,
                        data: dataPoints,
                        borderColor: 'rgba(59, 130, 246, 1)',
                        backgroundColor: 'rgba(59, 130, 246, 1)',
                        fill: false,
                        tension: 0,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: `Wykres dla: ${word}`,
                            font: {
                                size: 18
                            }
                        },
                        // MODIFICATION: Disable the tooltip entirely
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 10,
                            ticks: {
                                stepSize: 1,
                                font: {
                                    size: 14
                                },
                                callback: function(value, index, values) {
                                    return value > 9 ? null : value;
                                }
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });

            // --- Cycle Information ---
            const cycleInfo = document.createElement('p');
            cycleInfo.className = 'mt-4 text-lg font-semibold';

            const firstLetterSoma = dataPoints[0];
            const lastLetterSoma = dataPoints[dataPoints.length - 1];

            if (lastLetterSoma > firstLetterSoma) {
                cycleInfo.innerHTML = `<span class="text-green-600">Cykl wzrostowy ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            } else if (lastLetterSoma < firstLetterSoma) {
                cycleInfo.innerHTML = `<span class="text-red-600">Cykl upadkowy ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            } else {
                cycleInfo.innerHTML = `<span class="text-gray-600">Cykl stagnacyjny ${firstLetterSoma} &rarr; ${lastLetterSoma}</span>`;
            }
            container.appendChild(cycleInfo);
        }

        // Function to generate PDF for a specific word
        async function generatePDFForWord(word, resultContainer, wordId) {
            // Find the PDF button for this word using the data-word-id attribute
            // This works regardless of where the button is currently positioned
            const pdfButton = document.querySelector(`button[data-word-id="${wordId}"]`);
            const originalText = pdfButton.textContent;
            pdfButton.textContent = 'Generowanie PDF...';
            pdfButton.disabled = true;

            try {
                // Initialize jsPDF
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 10; // margin in mm

                // Find table in this container
                const tableContainer = resultContainer.querySelector('div:first-child');

                if (tableContainer) {
                    // Capture table as canvas
                    const tableCanvas = await html2canvas(tableContainer, {
                        scale: 3, // Adjust quality if needed
                        logging: false,
                        useCORS: true
                    });

                    // Set desired width as a percentage of page width
                    const widthPercentage = 0.8; // 80% of page width
                    const imgWidth = pageWidth * widthPercentage;
                    const imgHeight = (tableCanvas.height * imgWidth) / tableCanvas.width;

                    // Center the table horizontally
                    const xOffset = (pageWidth - imgWidth) / 2;
                    // Position vertically
                    const yOffset = margin;

                    // Add table image to PDF
                    const tableImgData = tableCanvas.toDataURL('image/jpeg', 0.95);
                    doc.addImage(tableImgData, 'JPEG', xOffset, yOffset, imgWidth, imgHeight);

                    // Keep track of current vertical position on the page
                    let cursorY = yOffset + imgHeight + 10; // 10mm spacing after main table

                    // --- Include "Analiza samogłosek i spółgłosek" if visible ---
                    const analysisContainer = document.getElementById(`analysis-container-${wordId}`);
                    if (analysisContainer && !analysisContainer.classList.contains('hidden')) {
                        // Give the browser a tiny moment (in case the user just toggled it)
                        await new Promise(resolve => setTimeout(resolve, 50));

                        // FIX: The analysis table uses fade-in animation (opacity:0 -> 1).
                        // When html2canvas runs too early, it captures it as transparent.
                        // Temporarily force full visibility and disable animations for capture.
                        const elemsToForce = analysisContainer.querySelectorAll('.table-container, .cycles-table');
                        const previousInline = [];
                        elemsToForce.forEach(el => {
                            previousInline.push({
                                el,
                                opacity: el.style.opacity,
                                animation: el.style.animation,
                                transform: el.style.transform,
                            });
                            el.style.opacity = '1';
                            el.style.animation = 'none';
                            el.style.transform = 'none';
                        });

                        // Ensure styles are applied before snapshot
                        await new Promise(requestAnimationFrame);

                        const analysisCanvas = await html2canvas(analysisContainer, {
                            scale: 2,
                            logging: false,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                        });

                        // Restore previous inline styles
                        previousInline.forEach(({ el, opacity, animation, transform }) => {
                            el.style.opacity = opacity;
                            el.style.animation = animation;
                            el.style.transform = transform;
                        });

                        const analysisImgWidth = pageWidth * widthPercentage;
                        const analysisImgHeight = (analysisCanvas.height * analysisImgWidth) / analysisCanvas.width;
                        const analysisXOffset = (pageWidth - analysisImgWidth) / 2;

                        // New page if not enough space
                        if (cursorY + analysisImgHeight + margin > pageHeight) {
                            doc.addPage();
                            cursorY = margin;
                        }

                        const analysisImgData = analysisCanvas.toDataURL('image/jpeg', 0.95);
                        doc.addImage(analysisImgData, 'JPEG', analysisXOffset, cursorY, analysisImgWidth, analysisImgHeight);
                        cursorY += analysisImgHeight + 10; // spacing after analysis
                    }

                    // --- Include chart if visible ---
                    const chartSection = resultContainer.querySelector('div.mt-6.text-center');
                    const chartContainer = chartSection?.querySelector(`div#chart-container-${wordId}`);
                    const chartIsHidden = !chartContainer || chartContainer.classList.contains('hidden');

                    if (!chartIsHidden) {
                        await new Promise(resolve => setTimeout(resolve, 100));

                        const originalPadding = chartContainer.style.paddingBottom;
                        chartContainer.style.paddingBottom = '20px';

                        const chartCanvas = await html2canvas(chartContainer, {
                            scale: 2,
                            logging: false,
                            useCORS: true
                        });

                        chartContainer.style.paddingBottom = originalPadding;

                        const chartImgWidth = pageWidth * widthPercentage;
                        let chartImgHeight = (chartCanvas.height * chartImgWidth) / chartCanvas.width;
                        const chartXOffset = (pageWidth - chartImgWidth) / 2;

                        // If the chart is too tall to fit on a fresh page, scale it down to fit page height
                        const maxHeightPerPage = pageHeight - 2 * margin;
                        if (chartImgHeight > maxHeightPerPage) {
                            chartImgHeight = maxHeightPerPage;
                        }

                        // New page if not enough space on current one
                        if (cursorY + chartImgHeight + margin > pageHeight) {
                            doc.addPage();
                            cursorY = margin;
                        }

                        const chartImgData = chartCanvas.toDataURL('image/jpeg', 0.95);
                        doc.addImage(chartImgData, 'JPEG', chartXOffset, cursorY, chartImgWidth, chartImgHeight);
                        cursorY += chartImgHeight;
                    }
                }

                // Save the PDF with the word as filename
                const filename = `numerologia_${word.replace(/\s+/g, '_')}.pdf`;
                doc.save(filename);

            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('Wystąpił błąd podczas generowania PDF. Spróbuj ponownie.');
            } finally {
                // Restore button state
                pdfButton.textContent = originalText;
                pdfButton.disabled = false;
            }
        }

        // Legacy function kept for compatibility
        async function generatePDF() {
            alert('Ta funkcja została zastąpiona przez indywidualne przyciski "Zapisz PDF" dla każdego słowa.');
        }

        // Inicjalizacja aplikacji po załadowaniu strony
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
