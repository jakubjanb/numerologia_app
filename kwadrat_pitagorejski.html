<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwadrat Pitagorejski — Analiza</title>

    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }

        /* ─── GRID ─────────────────────────────────────────────── */
        .numerology-square {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 300px;
            height: 300px;
            border: 2px solid #4a5568; /* dark-gray */
            border-radius: 0.5rem;
            margin-inline: auto;
            overflow: hidden; /* clip children to rounded border */
        }
        .square-cell {
            border: 1px solid #cbd5e0; /* mid-gray */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
            box-sizing: border-box;
            position: relative;
            min-height: 100px;
            overflow: hidden;
        }
        /* base green for any cell with ≥1 letter */
        .square-cell.has-letter {
            background-color: rgba(152, 251, 152, 0.25);
            background-clip: padding-box;
        }
        /* deeper green for completed lines */
        .square-cell.is-highlighted {
            background-color: rgba(152, 251, 152, 0.45);
            background-clip: padding-box;
        }
        /* red for empty cells */
        .square-cell.is-empty {
            background-color: rgba(255, 99, 71, 0.15);
            background-clip: padding-box;
        }

        /* ─── TYPOGRAPHY ───────────────────────────────────────── */
        .cell-number {
            position: absolute;
            top: 0.05rem;
            left: 0.3rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #a0aec0; /* light-gray */
        }
        .cell-letters {
            font-weight: 500;
            color: #2d3748; /* dark-gray */
            word-break: break-word;
            line-height: 1.4;
            transition: font-size 0.2s ease-in-out;
            text-align: center;
        }

        /* ─── SUMMARY & ANALYSIS TABLES ───────────────────────── */
        .summary-table, .analysis-table {
            width: 80%; max-width: 450px;
            margin: 1rem auto 0 auto;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .summary-table th, .summary-table td,
        .analysis-table th, .analysis-table td {
            border: 1px solid #d1d5db;
            padding: 0.5rem;
            text-align: center;
        }
        .summary-table th, .analysis-table th { background-color: #f3f4f6; font-weight: 600; }

        /* dynamic shades for "Liczba" column */
        .count-0  { background-color: rgba(255, 99, 71, 0.15); }
        .count-1  { background-color: rgba(152, 251, 152, 0.20); }
        .count-2  { background-color: rgba(152, 251, 152, 0.30); }
        .count-3  { background-color: rgba(152, 251, 152, 0.40); }
        .count-4  { background-color: rgba(152, 251, 152, 0.50); }
        .count-5  { background-color: rgba(152, 251, 152, 0.60); }
        .count-6, .count-7, .count-8, .count-9 { background-color: rgba(152, 251, 152, 0.80); }

        /* analysis table cell colors */
        .cell-ok { background-color: rgba(60, 179, 113, 0.3); color: #2e7d32; }
        .cell-not-ok { background-color: rgba(255, 99, 71, 0.2); color: #c62828; }
        .analysis-table .cell-ok, .analysis-table .cell-not-ok { font-weight: bold; }

        .analysis-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
<div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl">
     <div class="mb-6 text-center">
        <a href="index.html" class="text-indigo-600 hover:text-indigo-800 font-medium">
            &larr; Powrót do strony głównej
        </a>
    </div>
    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-6">Kwadrat Pitagorejski</h1>

        <!-- Input -->
        <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">
            <input type="text" id="nameInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="np. Jan Kowalski" />
        </div>

        <div class="text-center mb-8">
            <button id="calculateBtn" class="bg-blue-600 text-white font-bold py-2 px-8 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-transform transform hover:scale-105">Generuj Kwadraty</button>
        </div>

        <div id="resultsArea" class="space-y-12"></div>
    </div>
</div>

<script>
/******** DATA *********/
const letterToSoma = {
  'A':1,'a':1,'Ą':1,'ą':1,'Ä':1,'ä':1,'J':1,'j':1,'S':1,'s':1,'Ś':1,'ś':1,'ß':1,
  'B':2,'b':2,'K':2,'k':2,'T':2,'t':2,
  'C':3,'c':3,'Ć':3,'ć':3,'L':3,'l':3,'Ł':3,'ł':3,'U':3,'u':3,'Ü':3,'ü':3,
  'D':4,'d':4,'M':4,'m':4,'V':4,'v':4,
  'E':5,'e':5,'Ę':5,'ę':5,'N':5,'n':5,'Ń':5,'ń':5,'Ñ':5,'ñ':5,'W':5,'w':5,
  'F':6,'f':6,'O':6,'o':6,'Ó':6,'ó':6,'Ö':6,'ö':6,'X':6,'x':6,
  'G':7,'g':7,'P':7,'p':7,'Y':7,'y':7,
  'H':8,'h':8,'Q':8,'q':8,'Z':8,'z':8,'Ż':8,'ż':8,'Ž':8,'ž':8,
  'I':9,'i':9,'R':9,'r':9
};

const ARROWS = [[1,2,3], [4,5,6], [7,8,9], [1,4,7], [2,5,8], [3,6,9], [1,5,9], [3,5,7]];
const DYADS = [[2,6], [6,8], [4,8], [2,4]];

/******** DOM CACHE *********/
const calculateBtn = document.getElementById('calculateBtn');
const nameInput    = document.getElementById('nameInput');
const resultsArea  = document.getElementById('resultsArea');

calculateBtn.addEventListener('click', processInput);
nameInput.addEventListener('keyup', e => { if (e.key === 'Enter') processInput(); });

/******** MAIN *********/
function processInput() {
  resultsArea.innerHTML = '';
  const input = nameInput.value.trim();
  if (!input) {
    resultsArea.innerHTML = '<p class="text-center text-red-500">Proszę wpisać tekst.</p>';
    return;
  }
  const words = input.split(/\s+/).filter(Boolean);
  if (words.length > 5) {
    resultsArea.innerHTML = '<p class="text-center text-red-500 font-semibold">Zbyt wiele słów. Maksymalnie 5.</p>';
    return;
  }
  words.forEach(createSquare);
}

/******** BUILD SQUARE *********/
function createSquare(word){
  // Create a self-contained wrapper for this square and all its elements
  const wrapper = document.createElement('div');
  wrapper.className = 'space-y-4 border-t-2 pt-8 mt-8';

  const h = document.createElement('h2');
  h.className = 'text-2xl font-bold text-center text-gray-800';
  h.textContent = `Kwadrat dla: "${word}"`;
  wrapper.appendChild(h);

  const grid = document.createElement('div');
  grid.className = 'numerology-square';
  const cells = {};
  for(let i = 1; i <= 9; i++){
    const c = document.createElement('div');
    c.className = 'square-cell';
    c.innerHTML = `<span class='cell-number'>${i}</span><div id='letters-${word}-${i}' class='cell-letters'></div>`;
    cells[i] = c;
  }

  for(const ch of word){
    const v = letterToSoma[ch];
    if(!v) continue;
    const box = cells[v].querySelector(`#letters-${word}-${v}`);
    box.textContent += box.textContent ? `, ${ch}` : ch;
  }

  for(let i = 1; i <= 9; i++){
    const box = cells[i].querySelector(`#letters-${word}-${i}`);
    const len = box.textContent.length;
    box.style.fontSize = len > 25 ? '0.65rem' : len > 18 ? '0.8rem' : len > 12 ? '0.9rem' : len > 6 ? '1rem' : '1.1rem';
  }

  const filledMap = colourCells(cells, word);

  [3,6,9,2,5,8,1,4,7].forEach(n => grid.appendChild(cells[n]));
  wrapper.appendChild(grid);

  // --- Buttons and collapsible sections ---
  const btnContainer = document.createElement('div');
  btnContainer.className = 'text-center mt-6 flex flex-wrap justify-center gap-4';

  // Summary Button
  const summaryBtn = document.createElement('button');
  summaryBtn.className = 'bg-gray-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-700 active:bg-gray-800 transition';
  summaryBtn.textContent = 'Podsumowanie';
  const summaryContainer = document.createElement('div');
  summaryContainer.className = 'hidden mt-4 summary-container';
  summaryBtn.addEventListener('click', () => {
      const isHidden = summaryContainer.classList.toggle('hidden');
      summaryBtn.textContent = isHidden ? 'Podsumowanie' : 'Ukryj Podsumowanie';
      if(!isHidden && !summaryContainer.innerHTML) buildSummary(word, summaryContainer);

      // Get references to elements
      const pdfBtn = wrapper.querySelector('.pdf-button');
      const pdfBottomContainer = document.getElementById(`pdf-bottom-container-${word.replace(/\s+/g, '_')}`);
      const analysisVisible = !analysisContainer.classList.contains('hidden');

      // Update PDF button position
      if (!isHidden || analysisVisible) {
          // At least one section is visible, move PDF button to bottom container
          pdfBottomContainer.style.display = 'flex';
          pdfBottomContainer.appendChild(pdfBtn);
      } else {
          // Both sections are hidden, move PDF button back to button container
          pdfBottomContainer.style.display = 'none';
          btnContainer.appendChild(pdfBtn);
      }
  });
  btnContainer.appendChild(summaryBtn);

  // Analysis Button
  const analysisBtn = document.createElement('button');
  analysisBtn.className = 'bg-teal-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-teal-700 active:bg-teal-800 transition';
  analysisBtn.textContent = 'Analiza Strzał i Diad';
  const analysisContainer = document.createElement('div');
  analysisContainer.className = 'hidden mt-4 analysis-container';
  analysisBtn.addEventListener('click', () => {
      const isHidden = analysisContainer.classList.toggle('hidden');
      analysisBtn.textContent = isHidden ? 'Analiza Strzał i Diad' : 'Ukryj Analizę';
      if(!isHidden && !analysisContainer.innerHTML) buildAnalysisTables(analysisContainer, filledMap);

      // Get references to elements
      const pdfBtn = wrapper.querySelector('.pdf-button');
      const pdfBottomContainer = document.getElementById(`pdf-bottom-container-${word.replace(/\s+/g, '_')}`);
      const summaryVisible = !summaryContainer.classList.contains('hidden');

      // Update PDF button position
      if (!isHidden || summaryVisible) {
          // At least one section is visible, move PDF button to bottom container
          pdfBottomContainer.style.display = 'flex';
          pdfBottomContainer.appendChild(pdfBtn);
      } else {
          // Both sections are hidden, move PDF button back to button container
          pdfBottomContainer.style.display = 'none';
          btnContainer.appendChild(pdfBtn);
      }
  });
  btnContainer.appendChild(analysisBtn);

  // --- PDF Button (specific to this square) ---
  const pdfBtn = document.createElement('button');
  pdfBtn.className = 'bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition pdf-button';
  pdfBtn.textContent = 'Zapisz PDF';
  pdfBtn.addEventListener('click', () => generatePdfForSquare(word, wrapper));
  btnContainer.appendChild(pdfBtn);

  // Create a dedicated container for the PDF button that will be positioned at the bottom
  const pdfBottomContainer = document.createElement('div');
  pdfBottomContainer.className = 'flex justify-center mt-4 pdf-bottom-container';
  pdfBottomContainer.id = `pdf-bottom-container-${word.replace(/\s+/g, '_')}`;
  pdfBottomContainer.style.display = 'none'; // Initially hidden

  wrapper.appendChild(btnContainer);
  wrapper.appendChild(summaryContainer);
  wrapper.appendChild(analysisContainer);
  wrapper.appendChild(pdfBottomContainer);

  resultsArea.appendChild(wrapper);
}

/******** COLOUR CELLS *********/
function colourCells(cells, word){
  const filled = {}; // boolean map
  for(let i=1; i<=9; i++){
    const has = !!cells[i].querySelector(`#letters-${word}-${i}`).textContent.trim();
    filled[i] = has;
    cells[i].classList.add(has ? 'has-letter' : 'is-empty');
  }

  const lines = [...ARROWS]; // Use ARROWS for highlighting full lines
  lines.forEach(line => {
    if(line.every(n => filled[n])) {
      line.forEach(n => cells[n].classList.add('is-highlighted'));
    }
  });
  return filled; // Return the map for later use
}

/******** SUMMARY TABLE *********/
function buildSummary(word, container){
  const buckets = Array.from({length:10}, () => []);
  for(const ch of word){
    const v = letterToSoma[ch];
    if(v) buckets[v].push(ch);
  }

  const tbl = document.createElement('table');
  tbl.className = 'summary-table';
  const head = tbl.createTHead();
  const hr = head.insertRow();
  ['Liczba', 'Litery', 'Suma'].forEach(t => {
    const th = document.createElement('th');
    th.textContent = t;
    hr.appendChild(th);
  });
  const body = tbl.createTBody();
  for(let i=1; i<=9; i++){
    const row = body.insertRow();
    const cnt = buckets[i].length;
    const liczbaCell = row.insertCell();
    liczbaCell.textContent = i;
    liczbaCell.className = `count-${Math.min(cnt, 7)}`;
    row.insertCell().textContent = buckets[i].join(', ') || '-';
    row.insertCell().textContent = cnt;
  }
  container.appendChild(tbl);
}

/******** ANALYSIS TABLES *********/
function buildAnalysisTables(container, filledMap) {
    container.innerHTML = ''; // Clear previous content
    const wrapper = document.createElement('div');
    wrapper.className = 'analysis-wrapper';

    // --- Arrows Table ---
    const arrowsDiv = document.createElement('div');
    const hArrows = document.createElement('h3');
    hArrows.className = 'text-xl font-bold text-center text-gray-800 mb-3';
    hArrows.textContent = 'Strzały';
    arrowsDiv.appendChild(hArrows);

    const arrowsTbl = document.createElement('table');
    arrowsTbl.className = 'analysis-table';
    const arrowsHead = arrowsTbl.createTHead();
    const arrowsHr = arrowsHead.insertRow();
    ['Strzała', ''].forEach(t => {
        const th = document.createElement('th');
        th.textContent = t;
        arrowsHr.appendChild(th);
    });
    const arrowsBody = arrowsTbl.createTBody();
    ARROWS.forEach(arrow => {
        const row = arrowsBody.insertRow();
        const isComplete = arrow.every(n => filledMap[n]);
        const className = isComplete ? 'cell-ok' : 'cell-not-ok';

        const arrowCell = row.insertCell();
        arrowCell.textContent = arrow.join(' ');
        arrowCell.className = className;

        const resultCell = row.insertCell();
        resultCell.textContent = isComplete ? '✓' : '✗';
        resultCell.className = className;
    });
    arrowsDiv.appendChild(arrowsTbl);
    wrapper.appendChild(arrowsDiv);

    // --- Dyads Table ---
    const dyadsDiv = document.createElement('div');
    const hDyads = document.createElement('h3');
    hDyads.className = 'text-xl font-bold text-center text-gray-800 mb-3';
    hDyads.textContent = 'Diady';
    dyadsDiv.appendChild(hDyads);

    const dyadsTbl = document.createElement('table');
    dyadsTbl.className = 'analysis-table';
    const dyadsHead = dyadsTbl.createTHead();
    const dyadsHr = dyadsHead.insertRow();
    ['Diada', ''].forEach(t => {
        const th = document.createElement('th');
        th.textContent = t;
        dyadsHr.appendChild(th);
    });
    const dyadsBody = dyadsTbl.createTBody();
    DYADS.forEach(dyad => {
        const row = dyadsBody.insertRow();
        const isComplete = dyad.every(n => filledMap[n]);
        const className = isComplete ? 'cell-ok' : 'cell-not-ok';

        const dyadCell = row.insertCell();
        dyadCell.textContent = dyad.join(' ');
        dyadCell.className = className;

        const resultCell = row.insertCell();
        resultCell.textContent = isComplete ? '✓' : '✗';
        resultCell.className = className;
    });
    dyadsDiv.appendChild(dyadsTbl);
    wrapper.appendChild(dyadsDiv);

    container.appendChild(wrapper);
}

/******** PDF GENERATION (FOR A SINGLE SQUARE) *********/
async function generatePdfForSquare(word, wrapperElement) {
    const pdfBtn = wrapperElement.querySelector('.pdf-button');
    if (pdfBtn) {
        pdfBtn.textContent = 'Generowanie...';
        pdfBtn.disabled = true;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = 190; // A4 width 210mm - 20mm margins

    // --- Find the content within the specific wrapper ---
    const grid = wrapperElement.querySelector('.numerology-square');
    const summary = wrapperElement.querySelector('.summary-container:not(.hidden)');
    const analysis = wrapperElement.querySelector('.analysis-container:not(.hidden)');

    // --- Create temporary containers for capturing content ---
    const page1Container = document.createElement('div');
    page1Container.style.width = '800px';
    page1Container.style.position = 'absolute';
    page1Container.style.left = '-9999px';
    page1Container.style.backgroundColor = 'white';
    page1Container.className = 'p-4';

    const page2Container = page1Container.cloneNode(false);
    let hasPage2Content = false;

    // --- Add main title to Page 1 ---
    const mainTitle = document.createElement('h1');
    mainTitle.textContent = `Kwadrat Pitagorejski dla: "${word}"`;
    mainTitle.className = 'text-3xl font-bold text-center text-gray-900 mb-8';
    page1Container.appendChild(mainTitle);

    // --- Populate containers with the content to be saved ---
    if (grid) {
        const clonedGrid = grid.cloneNode(true);
        // Apply specific styles to the cloned grid for PDF rendering
        const numberSpans = clonedGrid.querySelectorAll('.cell-number');
        numberSpans.forEach(span => {
            span.style.top = '-8px';
            span.style.left = '5px';
        });

        // Ensure letters are well-centered in the PDF
        const letterDivs = clonedGrid.querySelectorAll('.cell-letters');
        letterDivs.forEach(div => {
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            // Add these two lines to nudge it up
            div.style.position = 'relative';
            div.style.top = '-10px'; // Nudges the text 5 pixels up from the center
            div.style.justifyContent = 'center';
            div.style.height = '100%'; // Ensure it uses the full cell height
            div.style.padding = '5px'; // Add some padding
        });

        page1Container.appendChild(clonedGrid);
    }

    if (summary) {
        const summarySpacer = document.createElement('div');
        summarySpacer.style.height = '30px';
        page1Container.appendChild(summarySpacer);

        const summaryTitle = document.createElement('h3');
        summaryTitle.className = 'text-xl font-bold text-center text-gray-800 mb-3';
        summaryTitle.textContent = 'Podsumowanie';
        page1Container.appendChild(summaryTitle);

        page1Container.appendChild(summary.querySelector('.summary-table').cloneNode(true));
    }

    // If analysis is visible AND summary is NOT, add analysis to page 1
    if (analysis && !summary) {
        const analysisSpacer = document.createElement('div');
        analysisSpacer.style.height = '30px';
        page1Container.appendChild(analysisSpacer);
        page1Container.appendChild(analysis.cloneNode(true));
    }

    // If analysis is visible AND summary IS ALSO visible, add analysis to page 2
    if (analysis && summary) {
        hasPage2Content = true;
        const analysisTitle = document.createElement('h1');
        analysisTitle.textContent = `Analiza Strzał i Diad dla: "${word}"`;
        analysisTitle.className = 'text-3xl font-bold text-center text-gray-900 mb-8';
        page2Container.appendChild(analysisTitle);
        page2Container.appendChild(analysis.cloneNode(true));
    }

    // --- Generate Page 1 ---
    document.body.appendChild(page1Container);
    const canvas1 = await html2canvas(page1Container, { scale: 3, useCORS: true });
    document.body.removeChild(page1Container);

    const imgData1 = canvas1.toDataURL('image/jpeg', 0.9);
    const imgProps1 = pdf.getImageProperties(imgData1);
    const imgHeight1 = (imgProps1.height * pdfWidth) / imgProps1.width;
    pdf.addImage(imgData1, 'JPEG', 10, 20, pdfWidth, imgHeight1);

    // --- Generate Page 2 if there is content for it ---
    if (hasPage2Content) {
        pdf.addPage();
        document.body.appendChild(page2Container);
        const canvas2 = await html2canvas(page2Container, { scale: 3, useCORS: true });
        document.body.removeChild(page2Container);

        const imgData2 = canvas2.toDataURL('image/jpeg', 0.9);
        const imgProps2 = pdf.getImageProperties(imgData2);
        const imgHeight2 = (imgProps2.height * pdfWidth) / imgProps2.width;
        pdf.addImage(imgData2, 'JPEG', 10, 20, pdfWidth, imgHeight2);
    }

    // --- Save the final PDF ---
    const inputName = word.replace(/\s+/g, '_') || 'analiza';
    pdf.save(`kwadrat_${inputName}.pdf`);

    // Restore button state
    if (pdfBtn) {
        pdfBtn.textContent = 'Zapisz PDF';
        pdfBtn.disabled = false;
    }
}

</script>
</body>
</html>
