<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Analiza numerologiczna daty urodzenia - odkryj znaczenie swojej daty urodzenia">
    <title>Analiza Daty Urodzenia - Udoskonalona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ensure proper rendering on iOS devices -->
    <meta name="format-detection" content="telephone=no">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        /* Improved date input styling for better cross-browser compatibility */
        .date-input-container {
            position: relative;
            max-width: 100%;
        }
        .date-input-container .date-format-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 0.85rem;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .date-input-container input:focus ~ .date-format-hint,
        .date-input-container input:not(:placeholder-shown) ~ .date-format-hint {
            opacity: 0;
        }
        /* Improved styling for date inputs across browsers */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            background-color: white;
        }
        /* Calendar icon styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
            opacity: 0.7;
            transition: opacity 0.2s;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        /* Firefox specific styling */
        @-moz-document url-prefix() {
            input[type="date"] {
                background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23718096' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'></rect><line x1='16' y1='2' x2='16' y2='6'></line><line x1='8' y1='2' x2='8' y2='6'></line><line x1='3' y1='10' x2='21' y2='10'></line></svg>");
                background-repeat: no-repeat;
                background-position: calc(100% - 10px) center;
                background-size: 16px;
                padding-right: 30px;
            }
        }
        /* Mobile-friendly touch targets */
        @media (max-width: 640px) {
            input[type="date"], 
            .date-fallback select,
            button {
                min-height: 48px; /* Minimum touch target size */
            }
            input[type="date"]::-webkit-calendar-picker-indicator {
                width: 24px;
                height: 24px;
                padding: 4px;
            }
        }
        /* Focus states for accessibility */
        input[type="date"]:focus,
        button:focus {
            outline: 2px solid #4f46e5;
            outline-offset: 2px;
        }
        /* Fallback styling for browsers that don't support date input */
        .date-fallback {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap; /* Better for small screens */
        }
        .date-fallback select {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid #e2e8f0;
            background-color: white;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            min-width: 80px; /* Ensure reasonable size on mobile */
            flex: 1; /* Distribute space evenly */
        }
        .date-fallback select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        /* Error message styling */
        .date-error {
            color: #e53e3e;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
            opacity: 0;
            height: 0;
            transition: opacity 0.3s, height 0.3s;
            overflow: hidden;
        }
        .date-error.visible {
            opacity: 1;
            height: auto;
            margin-bottom: 0.5rem;
        }

        /* --- Ulepszone Style Wizualizacji --- */
        .birth-chart-container {
            width: 100%;
            max-width: 500px; /* Nieco większy dla lepszej czytelności */
            margin: 0 auto;
            opacity: 0;
            transform: scale(0.95);
            animation: fadeIn 0.8s ease-out forwards;
        }
        .birth-chart text {
            font-family: 'Inter', sans-serif;
            text-anchor: middle;
            fill: #4a5568;
        }
        .chart-label {
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            fill: #718096;
        }
        .chart-sub-number {
            font-size: 20px;
            font-weight: 500;
            fill: #4a5568;
        }
        .chart-final-number {
             font-size: 30px;
             font-weight: 700;
             fill: #2d3748;
        }
        /* Animacje SVG */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .draw-stroke {
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: draw 2s ease-out forwards;
        }
        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }
        /* Ulepszone style tabeli */
        .cycles-table {
            width: 100%;
            max-width: 550px;
            margin: 1.5rem auto 0 auto;
            border-collapse: collapse;
            font-size: 1rem;
            opacity: 0;
            animation: fadeIn 0.6s 0.3s ease-out forwards;
        }
        .cycles-table th, .cycles-table td {
            border: 1px solid #e2e8f0;
            padding: 0.85rem 1rem;
            text-align: center;
        }
        .cycles-table th {
            background-color: #f7fafc;
            font-weight: 600;
            color: #4a5568;
        }
        .cycles-table td:first-child {
            text-align: left;
            font-weight: 500;
            color: #2d3748;
        }
    </style>
</head>
<body class=" text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl">
        <div class="mb-6 text-center">
            <a href="numerologia.html" class="text-indigo-600 hover:text-indigo-800 font-medium">
                &larr; Powrót do strony głównej
            </a>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg">
            <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-8">Analiza Daty Urodzenia</h1>
            <div class="max-w-sm mx-auto space-y-4 mb-6">
                <label for="birthDateInput" class="block text-lg font-medium text-gray-700 text-center">Wprowadź swoją datę urodzenia:</label>
                <div class="date-input-container">
                    <input type="date" id="birthDateInput" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-center text-lg shadow-sm" 
                           placeholder=" "
                           aria-label="Data urodzenia"
                           aria-describedby="dateFormatHint dateError"
                           max="9999-12-31">
                    <span id="dateFormatHint" class="date-format-hint">DD-MM-RRRR</span>
                </div>
                <!-- Fallback for browsers that don't support date input -->
                <div id="dateFallback" class="date-fallback hidden" role="group" aria-labelledby="fallbackDateLabel">
                    <span id="fallbackDateLabel" class="sr-only">Wybierz datę urodzenia</span>
                    <select id="daySelect" aria-label="Dzień"></select>
                    <select id="monthSelect" aria-label="Miesiąc"></select>
                    <select id="yearSelect" aria-label="Rok"></select>
                </div>
                <div id="dateError" class="date-error" role="alert" aria-live="polite">Proszę wybrać poprawną datę urodzenia.</div>
            </div>
            <div class="text-center mb-8">
                <button id="analyzeBtn" 
                        class="bg-indigo-600 text-white font-bold py-3 px-10 rounded-lg hover:bg-indigo-700 active:bg-indigo-800 transition-all duration-300 transform hover:scale-105 shadow-md"
                        aria-label="Analizuj datę urodzenia">
                    Analizuj
                </button>
            </div>
            <div id="resultsArea" class="space-y-6">
                <!-- Wyniki analizy będą dynamicznie wstawiane tutaj -->
            </div>
        </div>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const birthDateInput = document.getElementById('birthDateInput');
        const resultsArea = document.getElementById('resultsArea');
        const dateFallback = document.getElementById('dateFallback');
        const daySelect = document.getElementById('daySelect');
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const dateError = document.getElementById('dateError');

        // --- INICJALIZACJA DATY I OBSŁUGA CROSS-BROWSER ---

        // Check if browser supports date input
        function isDateInputSupported() {
            const input = document.createElement('input');
            input.setAttribute('type', 'date');
            const notADateValue = 'not-a-date';
            input.setAttribute('value', notADateValue);
            return input.value !== notADateValue;
        }

        // Function to detect Safari browser
        function isSafariBrowser() {
            return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        }

        // Initialize date fallback if needed
        function initDateFallback() {
            // Set default max date to today
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            birthDateInput.setAttribute('max', `${year}-${month}-${day}`);

            // Use fallback for Safari or browsers that don't support date input
            if (isSafariBrowser() || !isDateInputSupported()) {
                birthDateInput.classList.add('hidden');
                dateFallback.classList.remove('hidden');

                // Add empty option as placeholder
                const dayPlaceholder = document.createElement('option');
                dayPlaceholder.value = '';
                dayPlaceholder.textContent = 'Dzień';
                dayPlaceholder.selected = true;
                dayPlaceholder.disabled = true;
                daySelect.appendChild(dayPlaceholder);

                // Populate day select
                for (let i = 1; i <= 31; i++) {
                    const option = document.createElement('option');
                    option.value = i < 10 ? '0' + i : i;
                    option.textContent = i;
                    daySelect.appendChild(option);
                }

                // Add empty option as placeholder
                const monthPlaceholder = document.createElement('option');
                monthPlaceholder.value = '';
                monthPlaceholder.textContent = 'Miesiąc';
                monthPlaceholder.selected = true;
                monthPlaceholder.disabled = true;
                monthSelect.appendChild(monthPlaceholder);

                // Populate month select with names
                const months = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 
                               'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
                months.forEach((month, i) => {
                    const option = document.createElement('option');
                    option.value = (i + 1) < 10 ? '0' + (i + 1) : (i + 1);
                    option.textContent = month;
                    monthSelect.appendChild(option);
                });

                // Add empty option as placeholder
                const yearPlaceholder = document.createElement('option');
                yearPlaceholder.value = '';
                yearPlaceholder.textContent = 'Rok';
                yearPlaceholder.selected = true;
                yearPlaceholder.disabled = true;
                yearSelect.appendChild(yearPlaceholder);

                // Populate year select (100 years back from current year)
                const currentYear = new Date().getFullYear();
                for (let i = currentYear; i >= currentYear - 100; i--) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    yearSelect.appendChild(option);
                }

                // Update date input when fallback selects change
                [daySelect, monthSelect, yearSelect].forEach(select => {
                    select.addEventListener('change', updateDateFromFallback);
                });

                // Add keyboard navigation between selects
                daySelect.addEventListener('keydown', function(e) {
                    if (e.key === 'ArrowRight') {
                        monthSelect.focus();
                    }
                });

                monthSelect.addEventListener('keydown', function(e) {
                    if (e.key === 'ArrowRight') {
                        yearSelect.focus();
                    } else if (e.key === 'ArrowLeft') {
                        daySelect.focus();
                    }
                });

                yearSelect.addEventListener('keydown', function(e) {
                    if (e.key === 'ArrowLeft') {
                        monthSelect.focus();
                    }
                });
            }
        }

        // Update the hidden date input from fallback selects
        function updateDateFromFallback() {
            if (daySelect.value && monthSelect.value && yearSelect.value) {
                // Validate day based on month and year
                const day = parseInt(daySelect.value, 10);
                const month = parseInt(monthSelect.value, 10);
                const year = parseInt(yearSelect.value, 10);

                // Check if day is valid for the selected month and year
                const lastDayOfMonth = new Date(year, month, 0).getDate();

                if (day > lastDayOfMonth) {
                    showDateError(`Wybrany miesiąc ma tylko ${lastDayOfMonth} dni.`);
                    return;
                }

                const dateStr = `${yearSelect.value}-${monthSelect.value}-${daySelect.value}`;
                birthDateInput.value = dateStr;

                // Validate the date
                validateDate(dateStr);
            }
        }

        // Validate date (check if it's a valid date and not in the future)
        function validateDate(dateStr) {
            if (!dateStr) {
                showDateError('Proszę wybrać datę urodzenia.');
                return false;
            }

            const selectedDate = new Date(dateStr);
            const today = new Date();

            if (isNaN(selectedDate.getTime())) {
                showDateError('Wprowadzona data jest nieprawidłowa.');
                return false;
            }

           // if (selectedDate > today) {
           //     showDateError('Data urodzenia nie może być w przyszłości.');
           //     return false;
           // }

            // Additional validation for realistic birth dates
            const minDate = new Date();
            minDate.setFullYear(minDate.getFullYear() - 520); // Maximum realistic age

            if (selectedDate < minDate) {
                // Just a warning, still allow the date
                showDateError('Uwaga: Wprowadzona data jest bardzo odległa. Kontynuuj jeśli jest poprawna.');
                return true;
            }

            hideDateError();
            return true;
        }

        function showDateError(message) {
            dateError.textContent = message;
            dateError.classList.add('visible');
        }

        function hideDateError() {
            dateError.classList.remove('visible');
        }

        // Initialize date input
        initDateFallback();

        // --- GŁÓWNA LOGIKA ---

        function reduceNumber(num) {
            let currentNum = num;
            const allSteps = [num];
            while (currentNum > 9) {
                const sum = String(currentNum).split('').reduce((acc, digit) => acc + parseInt(digit, 10), 0);
                allSteps.push(sum);
                currentNum = sum;
            }
            return { allSteps: allSteps, final: currentNum };
        }

        analyzeBtn.addEventListener('click', () => {
            const birthDate = birthDateInput.value;
            resultsArea.innerHTML = '';

            if (!validateDate(birthDate)) {
                // Focus on the date input for better UX
                birthDateInput.focus();
                return;
            }

            // Show loading state
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="inline-block animate-pulse">Analizuję...</span>';

            // Use setTimeout to allow the UI to update before heavy calculations
            setTimeout(() => {
                displayAnalysis(birthDate);
                // Reset button state
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analizuj';

                // Announce to screen readers that results are ready
                const resultsAnnouncement = document.createElement('div');
                resultsAnnouncement.className = 'sr-only';
                resultsAnnouncement.setAttribute('aria-live', 'polite');
                resultsAnnouncement.textContent = 'Wyniki analizy są gotowe.';
                document.body.appendChild(resultsAnnouncement);

                // Scroll to results
                resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

                // Remove announcement after it's been read
                setTimeout(() => {
                    document.body.removeChild(resultsAnnouncement);
                }, 1000);
            }, 100);
        });

        // Also validate on date input change
        birthDateInput.addEventListener('change', () => {
            validateDate(birthDateInput.value);
        });

        // Allow Enter key to trigger analysis
        birthDateInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                analyzeBtn.click();
            }
        });

        function sumAllDigits(dateString) {
            // Remove any non-digit characters and sum all individual digits
            const allDigits = dateString.replace(/\D/g, '').split('');
            const sum = allDigits.reduce((acc, digit) => acc + parseInt(digit, 10), 0);
            const reducedSum = reduceNumber(sum);
            return { sum, reducedSum };
        }

        function displayAnalysis(birthDate) {
            const [year, month, day] = birthDate.split('-').map(Number);
            const dayCalc = reduceNumber(day);
            const monthCalc = reduceNumber(month);
            const yearCalc = reduceNumber(year);

            // Calculate the sum of all individual digits from the date
            const dateString = `${day}.${month}.${year}`;
            const digitSum = sumAllDigits(dateString);

            const lifePathSum = dayCalc.final + monthCalc.final + yearCalc.final;
            const lifePathCalc = reduceNumber(lifePathSum);

            const analysisData = {
                day: dayCalc,
                month: monthCalc,
                year: yearCalc,
                lifePath: lifePathCalc,
                digitSum: digitSum
            };

            const chartHTML = generateChartSVG(analysisData);
            const chartContainer = document.createElement('div');
            chartContainer.innerHTML = chartHTML;

            const cyclesButton = generateCyclesButton(analysisData);

            resultsArea.appendChild(chartContainer);
            resultsArea.appendChild(cyclesButton);
        }

        // --- FUNKCJE GENERUJĄCE UI ---

        function generateChartSVG(data) {
            const cx = 250, cy = 250, r = 210;
            const topPoint = `${cx},${cy - r}`;
            const leftPoint = `${cx - r * Math.cos(Math.PI / 6)},${cy + r * Math.sin(Math.PI / 6)}`;
            const rightPoint = `${cx + r * Math.cos(Math.PI / 6)},${cy + r * Math.sin(Math.PI / 6)}`;

            const createTextBlock = (steps, x, startY, dy, finalClass) => {
                const initial = steps.slice(0, -1);
                const final = steps[steps.length - 1];
                let y = startY;
                const initialTspans = initial.map(line => `<tspan x="${x}" y="${y += dy}">${line}</tspan>`).join('');

                // Extra space only before the final number if there are previous steps.
                const finalYOffset = initial.length > 0 ? 2 : 0;

                return `
                    <text class="chart-sub-number">${initialTspans}</text>
                    <text x="${x}" y="${y + dy + finalYOffset}" class="${finalClass}">${final}</text>
                `;
            };

            // --- Logika centrująca ---
            // Use digitSum instead of lifePath for the center
            const digitSumValue = data.digitSum.sum;
            const digitSumReducedValue = data.digitSum.reducedSum.final;
            const lifePathDy = 35;
            const lifePathCenterY = 250;
            // Center position for the digit sum and its reduced form
            const digitSumStartY = lifePathCenterY - lifePathDy;

            return `
                <div class="birth-chart-container">
                    <svg class="birth-chart" viewBox="0 0 500 500">
                        <circle cx="${cx}" cy="${cy}" r="${r + 10}" fill="#f7fafc"/>
                        <circle class="draw-stroke" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#cbd5e0" stroke-width="1.5"/>
                        <polygon class="draw-stroke" style="animation-delay: 0.5s;" points="${topPoint} ${leftPoint} ${rightPoint}" fill="none" stroke="#a0aec0" stroke-width="2"/>

                        <g style="opacity:0; animation: fadeIn 1s 1s ease-out forwards;">
                            <text x="180" y="203" class="chart-label" transform="rotate(-60 180,203)">DZIEŃ</text>
                            <text x="325" y="210" class="chart-label" transform="rotate(60 325,210)">MIESIĄC</text>
                            <text x="250" y="345" class="chart-label">ROK</text>

                            ${createTextBlock(data.day.allSteps, 110, 160, 28, 'chart-final-number')}
                            ${createTextBlock(data.month.allSteps, 395, 160, 28, 'chart-final-number')}
                            ${createTextBlock(data.year.allSteps, 250, 350, 28, 'chart-final-number')}
                            <text x="250" y="${digitSumStartY}" class="chart-final-number">${digitSumValue}</text>
                            <text x="250" y="${digitSumStartY + lifePathDy}" class="chart-final-number">${digitSumReducedValue}</text>
                        </g>
                    </svg>
                </div>`;
        }

        function generateCyclesButton(data) {
            const buttonContainer = document.createElement('div');
            buttonContainer.className = 'text-center -mt-2 mb-4 opacity-0';
            buttonContainer.style.animation = 'fadeIn 1s 1.5s ease-out forwards';

            const button = document.createElement('button');
            button.textContent = 'Pokaż Cykle życia';
            button.className = 'bg-gray-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-700 active:bg-gray-800 transition';
            buttonContainer.appendChild(button);

            const tableContainer = document.createElement('div');
            tableContainer.className = 'hidden';

            button.addEventListener('click', () => {
                const isHidden = tableContainer.classList.toggle('hidden');
                button.textContent = isHidden ? 'Pokaż Cykle życia' : 'Ukryj Cykle życia';
                if (!isHidden && tableContainer.innerHTML === '') {
                    generateLifeCyclesTable(tableContainer, data);
                }
            });

            buttonContainer.appendChild(tableContainer);
            return buttonContainer;
        }

        function generateLifeCyclesTable(container, data) {
            const tableData = [
                { label: 'Liczba miesiąca', number: data.month.final, cycle: '1-27' },
                { label: 'Liczba dnia', number: data.day.final, cycle: '28-54' },
                { label: 'Liczba roku', number: data.year.final, cycle: '55-81' },
                { label: 'Liczba daty', number: data.digitSum.reducedSum.final, cycle: 'po 81' }
            ];
            const table = document.createElement('table');
            table.className = 'cycles-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Cykl życia</th>
                        <th>Liczba</th>
                        <th>Włada (lata życia)</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableData.map(row => `
                        <tr>
                            <td>${row.label}</td>
                            <td>${row.number}</td>
                            <td>${row.cycle}</td>
                        </tr>
                    `).join('')}
                </tbody>`;
            container.appendChild(table);
        }
    </script>
</body>
</html>
